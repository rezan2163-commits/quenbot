name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install

      - name: Run TypeScript checks
        run: pnpm run typecheck

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build dashboard
        run: pnpm --filter @workspace/market-intel run build

  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: python -m pip install --upgrade pip && pip install -r python_agents/requirements.txt

      - name: Syntax check Python files
        run: python -m py_compile python_agents/*.py
