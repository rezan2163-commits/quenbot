<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuenBot Dashboard</title>
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a2332;
            --accent: #00d4aa;
            --red: #ff4757;
            --text: #e2e8f0;
            --muted: #8899a6;
            --border: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.5rem; color: var(--accent); }
        header .status { font-size: 0.85rem; color: var(--muted); }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

        .price-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .price-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: border-color 0.2s;
        }
        .price-card:hover { border-color: var(--accent); }
        .price-card .coin-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .price-card .coin-header img { width: 32px; height: 32px; border-radius: 50%; }
        .price-card .coin-name { font-weight: 600; font-size: 1.05rem; }
        .price-card .coin-symbol { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; }
        .price-card .price { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
        .price-card .change { font-size: 0.9rem; font-weight: 600; }
        .change.positive { color: var(--accent); }
        .change.negative { color: var(--red); }
        .price-card .meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; }

        .section-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td { padding: 0.6rem 0.75rem; text-align: left; }
        th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        td img { width: 22px; height: 22px; border-radius: 50%; vertical-align: middle; margin-right: 0.5rem; }

        .strategy-results .stat {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .strategy-results .stat:last-child { border-bottom: none; }
        .strategy-results .stat .label { color: var(--muted); }
        .strategy-results .stat .value { font-weight: 600; }

        .trending-list { list-style: none; }
        .trending-list li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        .trending-list li:last-child { border-bottom: none; }
        .trending-list .rank { color: var(--muted); font-size: 0.85rem; min-width: 24px; }
        .trending-list img { width: 24px; height: 24px; border-radius: 50%; }
        .trending-list .name { font-weight: 500; }
        .trending-list .symbol { color: var(--muted); font-size: 0.85rem; }

        .chart-container {
            width: 100%;
            height: 200px;
            position: relative;
        }
        canvas { width: 100% !important; height: 100% !important; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--muted);
        }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg { color: var(--red); padding: 1rem; text-align: center; font-size: 0.9rem; }

        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .controls select, .controls input {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <h1>🤖 QuenBot Dashboard</h1>
    <span class="status" id="statusText">Yükleniyor...</span>
</header>

<div class="container">
    <!-- Price Cards -->
    <div class="price-cards" id="priceCards">
        <div class="loading"><div class="spinner"></div>Fiyatlar yükleniyor...</div>
    </div>

    <div class="grid-2">
        <!-- Market Table -->
        <div class="panel">
            <div class="section-title">📊 Piyasa Verileri</div>
            <div id="marketTable">
                <div class="loading"><div class="spinner"></div>Piyasa verileri yükleniyor...</div>
            </div>
        </div>

        <!-- Trending -->
        <div class="panel">
            <div class="section-title">🔥 Trend Coinler</div>
            <div id="trendingList">
                <div class="loading"><div class="spinner"></div>Trend verisi yükleniyor...</div>
            </div>
        </div>
    </div>

    <!-- Strategy Section -->
    <div class="panel" style="margin-bottom: 1.5rem;">
        <div class="section-title">🧬 Evrimsel Strateji Analizi</div>
        <div class="controls">
            <select id="strategyCoin">
                <option value="bitcoin">Bitcoin</option>
                <option value="ethereum">Ethereum</option>
                <option value="binancecoin">BNB</option>
                <option value="solana">Solana</option>
                <option value="ripple">XRP</option>
            </select>
            <select id="strategyDays">
                <option value="7">7 gün</option>
                <option value="30" selected>30 gün</option>
                <option value="90">90 gün</option>
                <option value="180">180 gün</option>
            </select>
            <button class="btn" id="runStrategyBtn" onclick="runStrategy()">Stratejiyi Çalıştır</button>
        </div>
        <div class="grid-2">
            <div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
            <div class="strategy-results" id="strategyResults">
                <p style="color: var(--muted); text-align: center;">Stratejiyi çalıştırmak için butona tıklayın.</p>
            </div>
        </div>
    </div>

    <!-- Market Table (Full) -->
    <div class="panel">
        <div class="section-title">📈 Piyasa Özeti (Top 20)</div>
        <div id="fullMarketTable">
            <div class="loading"><div class="spinner"></div>Veriler yükleniyor...</div>
        </div>
    </div>
</div>

<script>
const API = '';

function formatPrice(n) {
    if (n == null) return '—';
    if (n >= 1) return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    return '$' + n.toFixed(6);
}
function formatLargeNum(n) {
    if (n == null) return '—';
    if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
    return '$' + n.toLocaleString('en-US');
}
function changeClass(val) { return val >= 0 ? 'positive' : 'negative'; }
function changeStr(val) {
    if (val == null) return '—';
    const sign = val >= 0 ? '+' : '';
    return sign + val.toFixed(2) + '%';
}

async function fetchAPI(endpoint) {
    const resp = await fetch(API + endpoint);
    if (!resp.ok) throw new Error(`API error: ${resp.status}`);
    const json = await resp.json();
    return json.data;
}

async function loadPrices() {
    const container = document.getElementById('priceCards');
    try {
        const data = await fetchAPI('/api/market?per_page=6');
        container.innerHTML = data.map(coin => `
            <div class="price-card">
                <div class="coin-header">
                    <img src="${coin.image}" alt="${coin.name}">
                    <div>
                        <div class="coin-name">${coin.name}</div>
                        <div class="coin-symbol">${coin.symbol}</div>
                    </div>
                </div>
                <div class="price">${formatPrice(coin.current_price)}</div>
                <div class="change ${changeClass(coin.price_change_percentage_24h)}">
                    ${changeStr(coin.price_change_percentage_24h)} (24s)
                </div>
                <div class="meta">
                    Hacim: ${formatLargeNum(coin.total_volume)} · Piyasa Değeri: ${formatLargeNum(coin.market_cap)}
                </div>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = `<div class="error-msg">Fiyat verisi alınamadı: ${e.message}</div>`;
    }
}

async function loadMarketTable() {
    const container = document.getElementById('marketTable');
    try {
        const data = await fetchAPI('/api/market?per_page=10');
        container.innerHTML = `<table>
            <thead><tr><th>#</th><th>Coin</th><th>Fiyat</th><th>24s</th><th>Piyasa Değeri</th></tr></thead>
            <tbody>${data.map((c, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><img src="${c.image}" alt="">${c.name}</td>
                    <td>${formatPrice(c.current_price)}</td>
                    <td class="change ${changeClass(c.price_change_percentage_24h)}">${changeStr(c.price_change_percentage_24h)}</td>
                    <td>${formatLargeNum(c.market_cap)}</td>
                </tr>`).join('')}
            </tbody></table>`;
    } catch (e) {
        container.innerHTML = `<div class="error-msg">Piyasa verisi alınamadı: ${e.message}</div>`;
    }
}

async function loadTrending() {
    const container = document.getElementById('trendingList');
    try {
        const data = await fetchAPI('/api/trending');
        const coins = (data.coins || []).slice(0, 10);
        container.innerHTML = `<ul class="trending-list">${coins.map((item, i) => {
            const c = item.item;
            return `<li>
                <span class="rank">${i+1}</span>
                <img src="${c.small}" alt="">
                <span class="name">${c.name}</span>
                <span class="symbol">${c.symbol}</span>
            </li>`;
        }).join('')}</ul>`;
    } catch (e) {
        container.innerHTML = `<div class="error-msg">Trend verisi alınamadı: ${e.message}</div>`;
    }
}

async function loadFullMarketTable() {
    const container = document.getElementById('fullMarketTable');
    try {
        const data = await fetchAPI('/api/market?per_page=20');
        container.innerHTML = `<table>
            <thead><tr>
                <th>#</th><th>Coin</th><th>Fiyat</th>
                <th>1s</th><th>24s</th><th>7g</th>
                <th>Piyasa Değeri</th><th>Hacim (24s)</th>
            </tr></thead>
            <tbody>${data.map((c, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><img src="${c.image}" alt="">${c.name} <span style="color:var(--muted)">${c.symbol.toUpperCase()}</span></td>
                    <td>${formatPrice(c.current_price)}</td>
                    <td class="change ${changeClass(c.price_change_percentage_1h_in_currency)}">${changeStr(c.price_change_percentage_1h_in_currency)}</td>
                    <td class="change ${changeClass(c.price_change_percentage_24h_in_currency)}">${changeStr(c.price_change_percentage_24h_in_currency)}</td>
                    <td class="change ${changeClass(c.price_change_percentage_7d_in_currency)}">${changeStr(c.price_change_percentage_7d_in_currency)}</td>
                    <td>${formatLargeNum(c.market_cap)}</td>
                    <td>${formatLargeNum(c.total_volume)}</td>
                </tr>`).join('')}
            </tbody></table>`;
    } catch (e) {
        container.innerHTML = `<div class="error-msg">Piyasa verisi alınamadı: ${e.message}</div>`;
    }
}

/* Simple canvas chart */
function drawChart(canvas, prices) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    ctx.clearRect(0, 0, W, H);

    if (!prices || prices.length < 2) return;

    const vals = prices.map(p => p[1]);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const range = maxV - minV || 1;
    const pad = 10;

    ctx.beginPath();
    ctx.strokeStyle = '#00d4aa';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < vals.length; i++) {
        const x = pad + (i / (vals.length - 1)) * (W - 2*pad);
        const y = H - pad - ((vals[i] - minV) / range) * (H - 2*pad);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(0,212,170,0.15)');
    grad.addColorStop(1, 'rgba(0,212,170,0)');
    ctx.lineTo(pad + (W - 2*pad), H - pad);
    ctx.lineTo(pad, H - pad);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // labels
    ctx.fillStyle = '#8899a6';
    ctx.font = '11px sans-serif';
    ctx.fillText(formatPrice(maxV), pad, pad + 10);
    ctx.fillText(formatPrice(minV), pad, H - pad - 4);
}

async function runStrategy() {
    const coin = document.getElementById('strategyCoin').value;
    const days = document.getElementById('strategyDays').value;
    const btn = document.getElementById('runStrategyBtn');
    const resultsDiv = document.getElementById('strategyResults');

    btn.disabled = true;
    btn.textContent = 'Çalışıyor...';
    resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Strateji hesaplanıyor...</div>';

    try {
        const [histData, stratData] = await Promise.all([
            fetchAPI(`/api/history/${coin}?days=${days}`),
            fetchAPI(`/api/strategy/${coin}?days=${days}`)
        ]);

        // Draw chart
        const canvas = document.getElementById('priceChart');
        drawChart(canvas, histData.prices);

        // Show results
        resultsDiv.innerHTML = `
            <div class="stat"><span class="label">Coin</span><span class="value">${coin.charAt(0).toUpperCase() + coin.slice(1)}</span></div>
            <div class="stat"><span class="label">Süre</span><span class="value">${days} gün</span></div>
            <div class="stat"><span class="label">Veri Noktası</span><span class="value">${stratData.data_points}</span></div>
            <div class="stat"><span class="label">Alış Eşiği (norm.)</span><span class="value">${stratData.buy_threshold}</span></div>
            <div class="stat"><span class="label">Satış Eşiği (norm.)</span><span class="value">${stratData.sell_threshold}</span></div>
            <div class="stat"><span class="label">Ort. Kâr (norm.)</span><span class="value ${stratData.mean_profit >= 0 ? 'change positive' : 'change negative'}">${stratData.mean_profit}</span></div>
            <div class="stat"><span class="label">Std. Sapma</span><span class="value">${stratData.std_profit}</span></div>
            <div class="stat"><span class="label">Jenerasyon</span><span class="value">${stratData.generations}</span></div>
            <div class="stat"><span class="label">Popülasyon</span><span class="value">${stratData.population_size}</span></div>
        `;
    } catch (e) {
        resultsDiv.innerHTML = `<div class="error-msg">Strateji hatası: ${e.message}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Stratejiyi Çalıştır';
    }
}

// Initialize
async function init() {
    const statusEl = document.getElementById('statusText');
    try {
        await Promise.all([loadPrices(), loadMarketTable(), loadTrending(), loadFullMarketTable()]);
        statusEl.textContent = 'Bağlı · Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
        statusEl.style.color = '#00d4aa';
    } catch (e) {
        statusEl.textContent = 'Bağlantı hatası';
        statusEl.style.color = '#ff4757';
    }
}

init();
// Auto-refresh every 60 seconds
setInterval(init, 60000);
</script>

</body>
</html>
